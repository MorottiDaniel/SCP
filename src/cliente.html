<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

    <div id="navbar-root"></div>

    <main class="pagina-cadastro">
        <div class="area-formularios">
            <form id="clienteForm" class="formulario">
                <h1 id="clienteFormTitulo">Cadastro de Cliente</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="cliente_id">ID</label>
                        <input type="text" id="cliente_id" name="cliente_id" disabled>
                    </div>

                    <div class="campo">
                        <label for="tipo_cliente">Tipo de Cliente</label>
                        <select id="tipo_cliente" name="tipo_cliente">
                            <option value="">Selecione</option>
                            <option value="F">Pessoa física</option>
                            <option value="J">Pessoa jurídica</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label for="cpf_cnpj_cliente">CPF/CNPJ</label>
                    <input type="text" id="cpf_cnpj_cliente" name="cpf_cnpj_cliente" placeholder="Digite o CPF ou CNPJ" required>
                </div>

                <div class="campo">
                    <label for="nome_cliente">Nome do Cliente</label>
                    <input type="text" id="nome_cliente" name="nome_cliente" placeholder="Digite o nome do cliente" required>
                </div>

                <div class="campo hidden" id="campoOrcamentosCliente">
                    <div style="display:flex;gap:8px;">
                        <button type="button" id="btnCriarOrcamentoCliente" style="flex:1;padding:10px;font-size:15px;background:#198754;color:white;border:none;border-radius:4px;cursor:pointer;">Criar Orçamento</button>
                        <button type="button" id="btnVerOrcamentosCliente" style="flex:1;padding:10px;font-size:15px;background:#0d6efd;color:white;border:none;border-radius:4px;cursor:pointer;">Lista de Orçamentos</button>
                    </div>
                </div>

                <div class="botoes">
                    <button type="reset" id="btnLimparCliente">Limpar</button>
                    <button type="button" id="btnCancelarEdicao" class="btn-cancelar hidden">Cancelar edição</button>
                    <button type="button" id="btnExcluirCliente" class="btn-excluir hidden">Excluir</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>

            <form class="formulario" id="clienteSearchForm">
                <h1>Pesquisar Cliente</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="pesquisarClienteId">Pesquisar por ID</label>
                        <input type="text" id="pesquisarClienteId" name="cliente_id" placeholder="Digite o ID">
                    </div>

                    <div class="campo">
                        <label for="pesquisarTipoCliente">Pesquisar por tipo</label>
                        <select id="pesquisarTipoCliente" name="tipo_cliente">
                            <option value="">Selecione</option>
                            <option value="F">Pessoa física</option>
                            <option value="J">Pessoa jurídica</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label for="pesquisarCpfCnpj">Pesquisar por CPF/CNPJ</label>
                    <input type="text" id="pesquisarCpfCnpj" name="cpf_cnpj_cliente" placeholder="Digite o CPF ou CNPJ">
                </div>

                <div class="campo">
                    <label for="pesquisarNomeCliente">Pesquisar por nome</label>
                    <input type="text" id="pesquisarNomeCliente" name="nome_cliente" placeholder="Digite o nome do cliente">
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-pesquisar">Pesquisar</button>
                </div>
            </form>
        </div>

        <section class="lista-dados" id="clienteListaSection">
            <h1>Lista de Clientes</h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF/CNPJ</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="clienteTableBody"></tbody>
            </table>
        </section>
    </main>

    <script src="/src/js/html.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/src/js/supabase.js"></script>
    <script src="/src/js/cliente.js"></script>

</body>

</html>
