<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

    <div id="navbar-root"></div>

    <main class="pagina-cadastro">
        <div class="area-formularios">
            <form id="categoriaForm" class="formulario">
                <h1 id="categoriaFormTitulo">Cadastro de Categoria</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="categoria_produto_id">ID</label>
                        <input type="text" id="categoria_produto_id" name="categoria_produto_id" disabled>
                    </div>
                </div>

                <div class="campo">
                    <label for="ds_categoria_produto">Descrição da categoria</label>
                    <input type="text" id="ds_categoria_produto" name="ds_categoria_produto" placeholder="Digite a descrição" required>
                </div>

                <div class="campo hidden" id="campoProdutosCategoria">
                    <button type="button" id="btnVerProdutosCategoria" class="btn-campo-azul-full">Lista de Produtos</button>
                </div>

                <div class="botoes">
                    <button type="reset" id="btnLimparCategoria">Limpar</button>
                    <button type="button" id="btnCancelarEdicaoCategoria" class="btn-cancelar hidden">Cancelar edição</button>
                    <button type="button" id="btnExcluirCategoria" class="btn-excluir hidden">Excluir</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
                <p id="sucessoCategoria" class="msg-sucesso hidden"></p>
            </form>

            <form id="categoriaSearchForm" class="formulario">
                <h1>Pesquisar Categoria</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="pesquisarCategoriaId">Pesquisar por ID</label>
                        <input type="text" id="pesquisarCategoriaId" name="categoria_produto_id" placeholder="Digite o ID">
                    </div>
                </div>

                <div class="campo">
                    <label for="pesquisarDsCategoria">Pesquisar por descrição</label>
                    <input type="text" id="pesquisarDsCategoria" name="ds_categoria_produto" placeholder="Digite a descrição">
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-pesquisar">Pesquisar</button>
                </div>
            </form>
        </div>

        <section class="lista-dados" id="categoriaListaSection">
            <h1>Lista de Categoria</h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descrição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="categoriaTableBody"></tbody>
            </table>
        </section>
    </main>

    <script src="/src/js/html.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/src/js/supabase.js"></script>
    <script src="/src/js/categoria.js"></script>

</body>

</html>
