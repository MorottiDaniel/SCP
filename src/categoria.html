<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

    <nav class="navbar">
        <div class="menu-item" >
            <button class="menu-button" onclick="abrirDropdown('cadastro')">
                Cadastro
            </button>

            <div class="dropdown" id="cadastro">
                <a href="/src/cliente.html">Clientes</a>
                <a href="/src/categoria.html">Categorias</a>
                <a href="#">Produtos</a>
            </div>
        </div>

        <div class="menu-item" >
            <button class="menu-button" onclick="abrirDropdown('vendas')">
                Vendas
            </button>

            <div class="dropdown" id="vendas">
                <a href="#">Orçamentos</a>
            </div>
        </div>

        <button class="menu-button sair">Sair</button>
    </nav>

    <main class="pagina-cadastro">
        <div class="area-formularios">
            <form class="formulario">
                <h1>Cadastro de Categoria</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="id">ID</label>
                        <input type="text" id="id" name="id" disabled>
                    </div>
                </div>

                <div class="campo">
                    <label for="descricaoCategorias">Descrição da categoria</label>
                    <input type="text" id="descricaoCategorias" name="descricaoCategorias" placeholder="Digite a descrição" required>
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>

            <form class="formulario">
                <h1>Pesquisar Categoria</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="pesquisarCodigo">Pesquisar por ID</label>
                        <input type="text" id="pesquisarCodigo" name="pesquisarCodigo" placeholder="Digite o ID">
                    </div>
                </div>

                <div class="campo">
                    <label for="pesquisarDescricao">Pesquisar por descrição</label>
                    <input type="text" id="pesquisarDescricao" name="pesquisarDescricao" placeholder="Digite a descrição">
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-pesquisar">Pesquisar</button>
                </div>
            </form>
        </div>

        <section class="lista-dados">
            <h1>Lista de Categoria</h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descrição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Cliente exemplo</td>
                        <td>
                            <button class="btn-editar">Editar</button>
                            <button class="btn-excluir">Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="/src/js/html.js"></script>

</body>

</html>
