<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

    <nav class="navbar">
        <div class="menu-item">
            <button class="menu-button" onclick="abrirDropdown('cadastro')">
                Cadastro
            </button>

            <div class="dropdown" id="cadastro">
                <a href="/src/cliente.html">Clientes</a>
                <a href="/src/categoria.html">Categorias</a>
                <a href="/src/produto.html">Produtos</a>
            </div>
        </div>

        <div class="menu-item">
            <button class="menu-button" onclick="abrirDropdown('vendas')">
                Vendas
            </button>

            <div class="dropdown" id="vendas">
                <a href="#">Orçamentos</a>
            </div>
        </div>

        <button class="menu-button sair">Sair</button>
    </nav>

    <main class="pagina-cadastro">
        <div class="area-formularios">
            <form class="formulario">
                <h1>Cadastro de Produto</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="id">ID</label>
                        <input type="text" id="id" name="id" disabled>
                    </div>

                    <div class="campo">
                        <label for="idCategoria">ID categoria</label>
                        <input type="text" id="idCategoria" name="idCategoria" disabled>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label for="descrição">Descrição</label>
                    <input type="text" id="descrição" name="descrição" placeholder="Digite a descrição" required>
                </div>

                <div class="campo">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" name="marca" placeholder="Digite a marca" required>
                </div>

                <div class="campo">
                    <label for="estoque">Estoque</label>
                    <input type="number" id="estoque" name="estoque" placeholder="Digite a quantidade em estoque" min="0" required>
                </div>

                <div class="campo">
                    <label for="observacao">Observação</label>
                    <input type="text" id="observacao" name="observacao" placeholder="Digite a observação" required>
                </div>

                <div class="campo">
                    <label for="valor">Valor de venda</label>
                    <input type="text" id="valor" name="valor" placeholder="R$:" required>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="data">Data de cadastro</label>
                        <input type="date" id="data" name="data" disabled>
                    </div>

                    <div class="campo">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="">Selecione</option>
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>

            </form>

            <form class="formulario">
                <h1>Pesquisar de Produto</h1>

                 <div class="linha">
                    <div class="campo">
                        <label for="idPesquisa">ID</label>
                        <input type="text" id="idPesquisa" name="idPesquisa" disabled>
                    </div>

                    <div class="campo">
                        <label for="idCategoriaPesquisa">ID categoria</label>
                        <input type="text" id="idCategoriaPesquisa" name="idCategoriaPesquisa" disabled>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label for="descricaoPesquisa">Descrição</label>
                    <input type="text" id="descricaoPesquisa" name="descricaoPesquisa" placeholder="Digite a descrição" required>
                </div>

                <div class="campo">
                    <label for="observacaoPesquisa">Observação</label>
                    <input type="text" id="observacaoPesquisa" name="observacaoPesquisa" placeholder="Digite a observação" required>
                </div>

                <div class="campo">
                    <label for="valorPesquisa">Valor de venda</label>
                    <input type="text" id="valorPesquisa" name="valorPesquisa" placeholder="R$:" required>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="dataPesquisa">Data de cadastro</label>
                        <input type="date" id="dataPesquisa" name="dataPesquisa">
                    </div>

                    <div class="campo">
                        <label for="statusPesquisa">Status</label>
                        <select id="statusPesquisa" name="statusPesquisa">
                            <option value="">Selecione</option>
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-pesquisar">Pesquisar</button>
                </div>
            </form>
        </div>

        <section class="lista-dados">
            <h1>Lista de Produtos</h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Categoria</th>
                        <th>Marca</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Eletrônicos</td>
                        <td>Exemplo</td>
                        <td>R$ 999,00</td>
                        <td>12</td>
                        <td>
                            <button class="btn-editar">Editar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="/src/js/html.js"></script>

</body>

</html>
