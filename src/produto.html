<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/produto.css">
</head>

<body>

    <div id="navbar-root"></div>

    <main class="pagina-cadastro">
        <div class="area-formularios">
            <form id="produtoForm" class="formulario">
                <h1>Cadastro de Produto</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="produto_id">ID</label>
                        <input type="text" id="produto_id" name="produto_id" disabled>
                    </div>

                    <div class="campo">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="A">Ativo</option>
                            <option value="I">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label>Categoria</label>
                    <div class="categoria-row">
                        <input type="hidden" id="categoria_produto_id" class="categoria_produto_id" name="categoria_produto_id">
                        <input type="text" disabled placeholder="Nenhuma"
                            class="categoriaSelectedInput categoria-input" />
                        <button type="button" class="categoriaSelectBtn btn-salvar">Selecionar</button>
                    </div>
                </div>

                <div class="campo">
                    <label for="ds_produto">Descrição</label>
                    <input type="text" id="ds_produto" name="ds_produto" placeholder="Digite a descrição" required>
                </div>

                <div class="campo">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" name="marca" placeholder="Digite a marca">
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="valor_venda">Valor de venda</label>
                        <input type="number" id="valor_venda" name="valor_venda" placeholder="0,00" min="0" step="0.01" required>
                    </div>

                    <div class="campo">
                        <label for="quantidade_estoque">Estoque</label>
                        <input type="number" id="quantidade_estoque" name="quantidade_estoque"
                            placeholder="0" min="0" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="observacao">Observação</label>
                    <input type="text" id="observacao" name="observacao" placeholder="Digite a observação">
                </div>

                <div class="campo">
                    <label for="data_cadastro">Data de cadastro</label>
                    <input type="date" id="data_cadastro" name="data_cadastro" disabled>
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="button" id="btnCancelarEdicaoProduto" class="btn-cancelar hidden">Cancelar edição</button>
                    <button type="button" id="btnExcluirProduto" class="btn-excluir hidden">Excluir</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>

            <form id="produtoSearchForm" class="formulario">
                <h1>Pesquisar Produto</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="pesquisarProdutoId">ID</label>
                        <input type="text" id="pesquisarProdutoId" name="produto_id" placeholder="Digite o ID">
                    </div>

                    <div class="campo">
                        <label for="pesquisarStatus">Status</label>
                        <select id="pesquisarStatus" name="status">
                            <option value="">Selecione</option>
                            <option value="A">Ativo</option>
                            <option value="I">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label>Categoria</label>
                    <div class="categoria-row">
                        <input type="hidden" id="pesquisarCategoriaProdutoId" class="categoria_produto_id" name="categoria_produto_id">
                        <input type="text" disabled placeholder="Nenhuma"
                            class="categoriaSelectedInput categoria-input" />
                        <button type="button" class="categoriaSelectBtn btn-salvar">Selecionar</button>
                    </div>
                </div>

                <div class="campo">
                    <label for="pesquisarDsProduto">Descrição</label>
                    <input type="text" id="pesquisarDsProduto" name="ds_produto" placeholder="Digite a descrição">
                </div>

                <div class="campo">
                    <label for="pesquisarMarca">Marca</label>
                    <input type="text" id="pesquisarMarca" name="marca" placeholder="Digite a marca">
                </div>

                <div class="campo">
                    <label for="pesquisarObservacao">Observação</label>
                    <input type="text" id="pesquisarObservacao" name="observacao" placeholder="Digite a observação">
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-pesquisar">Pesquisar</button>
                </div>
            </form>
        </div>

        <section class="lista-dados" id="produtoListaSection">
            <h1>Lista de Produtos</h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Marca</th>
                        <th>Valor</th>
                        <th>Estoque</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="produtoTableBody"></tbody>
            </table>
        </section>
    </main>

    <script src="/src/js/html.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/src/js/supabase.js"></script>
    <script src="/src/js/produto.js"></script>

</body>

</html>
