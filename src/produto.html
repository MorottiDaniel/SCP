<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

    <nav class="navbar">
        <div class="menu-item">
            <button class="menu-button" onclick="abrirDropdown('cadastro')">
                Cadastro
            </button>

            <div class="dropdown" id="cadastro">
                <a href="/src/cliente.html">Clientes</a>
                <a href="/src/categoria.html">Categorias</a>
                <a href="/src/produto.html">Produtos</a>
            </div>
        </div>

        <div class="menu-item">
            <button class="menu-button" onclick="abrirDropdown('vendas')">
                Vendas
            </button>

            <div class="dropdown" id="vendas">
                <a href="#">Orçamentos</a>
            </div>
        </div>

        <button class="menu-button sair">Sair</button>
    </nav>

    <main class="pagina-cadastro">
        <div class="area-formularios">
            <form class="formulario">
                <h1>Cadastro de Produto</h1>

                <div class="linha">
                    <div class="campo">
                        <label for="produto_id">ID</label>
                        <input type="text" id="produto_id" name="produto_id" disabled>
                    </div>

                    <div class="campo">
                        <label for="categoria_produto_id">ID da Categoria</label>
                        <input type="number" id="categoria_produto_id" name="categoria_produto_id" placeholder="Digite o ID da categoria" min="1" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="ds_produto">Descrição</label>
                    <input type="text" id="ds_produto" name="ds_produto" placeholder="Digite a descrição" required>
                </div>

                <div class="campo">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" name="marca" placeholder="Digite a marca">
                </div>

                <div class="campo">
                    <label for="quantidade_estoque">Estoque</label>
                    <input type="number" id="quantidade_estoque" name="quantidade_estoque" placeholder="Digite a quantidade em estoque" min="0" required>
                </div>

                <div class="campo">
                    <label for="observacao">Observação</label>
                    <input type="text" id="observacao" name="observacao" placeholder="Digite a observação">
                </div>

                <div class="campo">
                    <label for="valor_venda">Valor de venda</label>
                    <input type="text" id="valor_venda" name="valor_venda" placeholder="R$:" required>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="data_cadastro">Data de cadastro</label>
                        <input type="date" id="data_cadastro" name="data_cadastro" disabled>
                    </div>

                    <div class="campo">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="A">Ativo</option>
                            <option value="I">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>

            </form>

            <form class="formulario">
                <h1>Pesquisar de Produto</h1>

                 <div class="linha">
                    <div class="campo">
                        <label for="pesquisarProdutoId">ID</label>
                        <input type="text" id="pesquisarProdutoId" name="produto_id" placeholder="Digite o ID">
                    </div>

                    <div class="campo">
                        <label for="pesquisarCategoriaProdutoId">ID categoria</label>
                        <input type="text" id="pesquisarCategoriaProdutoId" name="categoria_produto_id" placeholder="Digite o ID da categoria">
                    </div>
                </div>

                <div class="campo">
                    <label for="pesquisarDsProduto">Descrição</label>
                    <input type="text" id="pesquisarDsProduto" name="ds_produto" placeholder="Digite a descrição">
                </div>

                <div class="campo">
                    <label for="pesquisarMarca">Marca</label>
                    <input type="text" id="pesquisarMarca" name="marca" placeholder="Digite a marca">
                </div>

                <div class="campo">
                    <label for="pesquisarObservacao">Observação</label>
                    <input type="text" id="pesquisarObservacao" name="observacao" placeholder="Digite a observação">
                </div>

                <div class="campo">
                    <label for="pesquisarValorVenda">Valor de venda</label>
                    <input type="text" id="pesquisarValorVenda" name="valor_venda" placeholder="R$:">
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="pesquisarDataCadastro">Data de cadastro</label>
                        <input type="date" id="pesquisarDataCadastro" name="data_cadastro">
                    </div>

                    <div class="campo">
                        <label for="pesquisarStatus">Status</label>
                        <select id="pesquisarStatus" name="status">
                            <option value="">Selecione</option>
                            <option value="A">Ativo</option>
                            <option value="I">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="botoes">
                    <button type="reset">Limpar</button>
                    <button type="submit" class="btn-pesquisar">Pesquisar</button>
                </div>
            </form>
        </div>

        <section class="lista-dados">
            <h1>Lista de Produtos</h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Categoria</th>
                        <th>Marca</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Eletrônicos</td>
                        <td>Exemplo</td>
                        <td>R$ 999,00</td>
                        <td>12</td>
                        <td>
                            <button class="btn-editar">Editar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="/src/js/html.js"></script>

</body>

</html>
